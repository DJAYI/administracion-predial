spring.application.name=geopix

# ── SSL Configuration (Disabled for development) ─────────────────────────
server.ssl.enabled=false
server.port=8080
server.address=0.0.0.0

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/geopix}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

jwt.secret-key=${JWT_SECRET_KEY:cH4ng3Th1sS3cr3tK3yInPr0duct10n!AtL3ast256B1ts}
jwt.access-token.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token.expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ── Cookie JWT (Producción) ───────────────────────────────────────────
jwt.cookie.access-token-name=access_token
jwt.cookie.refresh-token-name=refresh_token
jwt.cookie.domain=
jwt.cookie.path=/
# Secure=true con SameSite=None = producción segura con HTTPS
jwt.cookie.secure=true
jwt.cookie.same-site=None
jwt.cookie.path=/

# ── CORS ────────────────────────────────────────────────────────────────────
# Use * to allow all origins (development mode for LAN access)
cors.allowed-origins[0]=https://192.168.1.64

logging.level.com.agmdesarrollos.geopix.security=DEBUG
logging.level.org.springframework.security=DEBUG
