services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: geopix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geopix}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - geopix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-geopix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geopix-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-geopix}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-cH4ng3Th1sS3cr3tK3yInPr0duct10n!AtL3ast256B1ts}
      JWT_ACCESS_EXPIRATION_MS: ${JWT_ACCESS_EXPIRATION_MS:-900000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
    # Backend is only accessible through nginx — no host port exposed
    expose:
      - "8080"

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  # Serves frontend and backend via HTTPS with SSL termination.
  # Both HTTP (80) and HTTPS (443) are exposed.
  #
  #   http://localhost       → HTTPS redirect
  #   https://localhost    → Frontend (3000) | API (8080)
  nginx:
    image: nginx:alpine
    container_name: geopix-proxy
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PROXY_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    # Required so nginx can reach the host's frontend dev server
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  geopix_pgdata:
